<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SacredWorld - Explorez les lieux sacrés du monde</title>
    <meta name="description" content="Découvrez et visitez les lieux sacrés et monuments religieux du monde entier. Application gamifiée avec classements et badges." />
    <meta name="author" content="SacredWorld" />
    <meta name="keywords" content="lieux sacrés, monuments religieux, patrimoine mondial, découverte culturelle, gamification" />

    <meta property="og:title" content="SacredWorld - Explorez les lieux sacrés du monde" />
    <meta property="og:description" content="Découvrez et visitez les lieux sacrés et monuments religieux du monde entier" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
      /* Pre-React baseline so the embedded preview can never show a white page,
         even if the iframe handshake hangs or React is still loading. */
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        background-color: #070710;
        color: #EDE8E0;
        font-family: 'Inter', system-ui, sans-serif;
      }
      #sw-bootstrap {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        background:
          radial-gradient(ellipse at 50% 30%, rgba(244,197,66,0.18) 0%, transparent 60%),
          #070710;
        z-index: 0;
        pointer-events: none;
      }
      #sw-bootstrap .sw-title {
        font-family: 'Cinzel', 'Playfair Display', serif;
        font-size: 22px;
        letter-spacing: 0.18em;
        color: #F4C542;
        text-shadow: 0 0 24px rgba(244,197,66,0.45);
      }
      #sw-bootstrap .sw-sub {
        font-size: 12px;
        color: rgba(237,232,224,0.7);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      #sw-bootstrap .sw-spin {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid rgba(244,197,66,0.25);
        border-top-color: #F4C542;
        animation: sw-spin 1s linear infinite;
      }
      #sw-bootstrap .sw-recovery {
        margin-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        max-width: 320px;
        text-align: center;
        pointer-events: auto;
      }
      #sw-bootstrap .sw-recovery p {
        font-size: 13px;
        color: rgba(237,232,224,0.85);
        margin: 0 0 6px;
        line-height: 1.5;
      }
      #sw-bootstrap .sw-btn {
        appearance: none;
        border: 1px solid rgba(244,197,66,0.5);
        background: rgba(244,197,66,0.12);
        color: #F4C542;
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 0.04em;
        padding: 10px 18px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.15s ease;
      }
      #sw-bootstrap .sw-btn:hover { background: rgba(244,197,66,0.22); }
      #sw-bootstrap .sw-btn:active { transform: scale(0.97); }
      #sw-bootstrap .sw-btn.secondary {
        border-color: rgba(237,232,224,0.3);
        background: transparent;
        color: rgba(237,232,224,0.85);
      }
      @keyframes sw-spin { to { transform: rotate(360deg); } }
      /* Hide the bootstrap shell once React has mounted. The shell is now a
         sibling of #root, so we use the adjacent-sibling combinator. */
      #root[data-app-mounted="true"] ~ #sw-bootstrap { display: none; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="sw-bootstrap" aria-hidden="true">
      <div class="sw-spin"></div>
      <div class="sw-title">SACREDWORLD</div>
      <div class="sw-sub">Chargement…</div>
      <div class="sw-recovery" id="sw-recovery" style="display:none;">
        <p>Le chargement prend plus de temps que prévu.</p>
        <button class="sw-btn" id="sw-reload">Recharger l'application</button>
        <button class="sw-btn secondary" id="sw-hard-reset">Vider le cache et recharger</button>
      </div>
    </div>
    <script>
      // Robust shell hider: hide as soon as React renders ANY content into
      // #root, regardless of the data-app-mounted attribute. Also offers a
      // recovery UI if nothing renders within 8s.
      (function () {
        var shell = document.getElementById('sw-bootstrap');
        var root = document.getElementById('root');
        if (!shell || !root) return;

        function hideShell() {
          shell.style.display = 'none';
        }
        function isMounted() {
          return (
            root.getAttribute('data-app-mounted') === 'true' ||
            root.childElementCount > 0
          );
        }
        if (isMounted()) { hideShell(); return; }

        var observer = new MutationObserver(function () {
          if (isMounted()) {
            hideShell();
            observer.disconnect();
          }
        });
        observer.observe(root, { childList: true, subtree: false, attributes: true, attributeFilter: ['data-app-mounted'] });

        setTimeout(function () {
          if (isMounted()) return;
          var rec = document.getElementById('sw-recovery');
          if (rec) rec.style.display = 'flex';

          var reloadBtn = document.getElementById('sw-reload');
          if (reloadBtn) reloadBtn.addEventListener('click', function () {
            location.reload();
          });

          var hardBtn = document.getElementById('sw-hard-reset');
          if (hardBtn) hardBtn.addEventListener('click', async function () {
            try {
              if ('serviceWorker' in navigator) {
                var regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(function (r) { return r.unregister(); }));
              }
              if ('caches' in window) {
                var keys = await caches.keys();
                await Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }
              try {
                Object.keys(localStorage).forEach(function (k) {
                  if (k.indexOf('sw-reset-') === 0) localStorage.removeItem(k);
                });
              } catch (_) { /* ignore */ }
            } catch (_) { /* ignore */ }
            location.reload();
          });
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
